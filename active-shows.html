    function parseLooseTruckingDate(value, flexReferenceYear = 2026) {
      if (!value) return null;

      const raw = String(value).trim();

      const mmdd = raw.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
      if (mmdd) {
        const month = Number(mmdd[1]);
        const day = Number(mmdd[2]);
        let year = flexReferenceYear;

        if (mmdd[3]) {
          year = Number(mmdd[3]);
          if (year < 100) year += 2000;
        }

        const date = new Date(year, month - 1, day);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      return parseFlexDate(raw);
    }

    function dayKey(date) {
      if (!date) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getFlexDateWindow(show) {
      const pulls = getPulledFlexData(show);
      const contexts = pulls.map((data) => data.showContext || {});

      const loadIn = getEarliestDate(contexts.map((context) => context.loadInDate));
      const loadOut = getLatestDate(contexts.map((context) => context.loadOutDate));
      const plannedStart = getEarliestDate(contexts.map((context) => context.plannedStartDate));
      const plannedEnd = getLatestDate(contexts.map((context) => context.plannedEndDate));

      return {
        startRaw: loadIn || plannedStart || null,
        endRaw: loadOut || plannedEnd || null,
        start: parseFlexDate(loadIn || plannedStart),
        end: parseFlexDate(loadOut || plannedEnd),
      };
    }

    function buildDateComparison(show) {
      const trucking = show.truckingSync;
      const rows = Array.isArray(trucking?.safeRows) ? trucking.safeRows : [];
      const flexWindow = getFlexDateWindow(show);
      const referenceYear =
        flexWindow.start?.getFullYear() ||
        flexWindow.end?.getFullYear() ||
        2026;

      const truckingDates = rows
        .map((row) => parseLooseTruckingDate(row.date, referenceYear))
        .filter(Boolean);

      const uniqueTruckingDays = [...new Set(truckingDates.map(dayKey))];

      if (!rows.length) {
        return {
          status: "UNKNOWN - No trucking rows",
          isMismatch: false,
          flexWindowLabel: flexWindow.start || flexWindow.end
            ? `${formatFlexDateShort(flexWindow.startRaw)} → ${formatFlexDateShort(flexWindow.endRaw)}`
            : "TBD",
          truckingDatesLabel: "No trucking rows",
          findings: ["No trucking rows are available to compare against FLEX dates."],
          actions: ["Run Query Trucking after FLEX is pulled."],
        };
      }

      if (!flexWindow.start && !flexWindow.end) {
        return {
          status: "YELLOW - FLEX dates unavailable",
          isMismatch: false,
          flexWindowLabel: "TBD",
          truckingDatesLabel: uniqueTruckingDays.join(", "),
          findings: ["Trucking dates exist, but FLEX load-in/load-out dates were not available for comparison."],
          actions: ["Pull or confirm the authoritative FLEX quote dates."],
        };
      }

      const start = flexWindow.start || flexWindow.end;
      const end = flexWindow.end || flexWindow.start;
      const startTime = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
      const endTime = new Date(end.getFullYear(), end.getMonth(), end.getDate()).getTime();

      const outsideDates = truckingDates.filter((date) => {
        const t = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        return t < startTime || t > endTime;
      });

      const flexWindowLabel = `${formatFlexDateShort(flexWindow.startRaw)} → ${formatFlexDateShort(flexWindow.endRaw)}`;
      const truckingDatesLabel = uniqueTruckingDays.length
        ? uniqueTruckingDays.join(", ")
        : "TBD";

      if (outsideDates.length) {
        const outsideLabels = [...new Set(outsideDates.map(dayKey))].join(", ");

        return {
          status: "RED - Date mismatch",
          isMismatch: true,
          flexWindowLabel,
          truckingDatesLabel,
          findings: [
            `FLEX date window is ${flexWindowLabel}.`,
            `Trucking rows include dates outside that FLEX window: ${outsideLabels}.`,
          ],
          actions: [
            "Confirm whether the trucking rows are attached to the correct show/workstream.",
            "Resolve date/source conflict before clearing readiness.",
          ],
        };
      }

      return {
        status: "GREEN - Dates align",
        isMismatch: false,
        flexWindowLabel,
        truckingDatesLabel,
        findings: [
          `FLEX date window is ${flexWindowLabel}.`,
          `Trucking dates fall inside the FLEX date window: ${truckingDatesLabel}.`,
        ],
        actions: ["No date mismatch detected from the current FLEX and trucking data."],
      };
    }

    function renderDateComparison(show) {
      if (!show.truckingSync) return "";

      const comparison = buildDateComparison(show);
      const findingItems = comparison.findings
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      const actionItems = comparison.actions
        .map((item) => `<li>${escapeHtml(item)}</li>`)

    }

    function buildTruckingConfidenceScore(data, show = null) {
      const comparison = data?.comparison || {};
      const summary = data?.summary || {};

      let score = 100;
      const reasons = [];

      if (!summary.rowsFound) {
        score -= 60;
        reasons.push("No Weekly Runs rows found");
      }

      if ((comparison.missingQuotes || []).length > 0) {
        score -= 20;
        reasons.push("Some FLEX quote/workstreams are missing trucking matches");
      }

      if (Number(summary.infoSentFalse || 0) > 0) {
        score -= Math.min(24, Number(summary.infoSentFalse || 0) * 2);
        reasons.push("Info Sent is still false on trucking rows");
      }

      if (Number(summary.lpoSentFalse || 0) > 0) {
        score -= Math.min(24, Number(summary.lpoSentFalse || 0) * 2);
        reasons.push("LPO Sent is still false on trucking rows");
      }

      if (Number(summary.maybeTruckRows || 0) > 0) {
        score -= Math.min(18, Number(summary.maybeTruckRows || 0) * 6);
        reasons.push("Maybe Truck rows are unresolved");
      }

      if (Number(summary.needDriverRows || 0) > 0) {
        score -= 35;
        reasons.push("NEED DRIVER rows are present");
      }

      if (show && data?.safeRows?.length) {
        const dateComparison = buildDateComparison(show);

        if (dateComparison.isMismatch) {
          score -= 25;
          reasons.push("Trucking dates fall outside the FLEX date window");
        }
      }

      const finalScore = clampScore(score);

      return {
        score: finalScore,
        color: scoreColor(finalScore),
        reasons,
      };
    }

    function buildTruckingActionQueue(show) {
      const data = show.truckingSync;
      if (!data?.summary) return [];

      const summary = data.summary;
      const comparison = data.comparison || {};
      const actions = [];

      const rowsFound = Number(summary.rowsFound || 0);
      const infoFalse = Number(summary.infoSentFalse || 0);
      const lpoFalse = Number(summary.lpoSentFalse || 0);
      const maybeTruckRows = Number(summary.maybeTruckRows || 0);
      const needDriverRows = Number(summary.needDriverRows || 0);
      const driverGaps = Number(summary.driverConfirmedFalse || 0);
      const missingQuotes = Array.isArray(comparison.missingQuotes)
        ? comparison.missingQuotes
        : [];

      let dateComparison = null;
      try {
        dateComparison = buildDateComparison(show);
      } catch {
        dateComparison = null;
      }

      if (!rowsFound) {
        const within30 = isShowWithin30Days(show);
        const mmRequired = showHasMmTruckingScope(show);
        const eventFolderLinked = isEventFolderLinked(show);

        if (eventFolderLinked && !within30 && !mmRequired) {
          actions.push({
            severity: "cyan",
            title: "Trucking not evaluated / no Weekly Runs rows found",
            owner: "Brian Kee / PM",
            action:
              "No urgent trucking action. Re-check Weekly Runs closer to load-in if Music Matters transportation becomes required.",
            why: "Event Folder scope is linked, but dates are TBD / not within 30 days and child quotes do not currently require Music Matters trucking.",
          });
        } else if (!within30 && !mmRequired) {
          actions.push({
            severity: "yellow",
            title: "No Music Matters trucking action found",
            owner: "Brian Kee / PM",
            action:
              "Confirm whether transportation should exist in Weekly Runs, or whether it is intentionally not required yet.",
            why: "Zero Weekly Runs rows can be normal for TBD / far-out shows or vendor-managed transport.",
          });
        } else {
          actions.push({
            severity: "red",
            title: "No Music Matters trucking action found",
            owner: "Brian Kee / PM",
            action:
              "Confirm whether Weekly Runs needs trucking rows for this show or whether transportation is intentionally not required.",
            why: within30
              ? "Show is within 30 days and no Weekly Runs execution rows are currently mapped."
              : "FLEX child scope indicates Music Matters transportation may be required, but no Weekly Runs rows are mapped.",
          });
        }
      }

      if (needDriverRows > 0) {
        actions.push({
          severity: "red",
          title: `${needDriverRows} NEED DRIVER row${needDriverRows === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Assign or confirm driver coverage for the NEED DRIVER rows.",
          why: "Driver coverage is a hard dependency for the trucking plan."
        });
      }

      if (maybeTruckRows > 0) {
        actions.push({
          severity: "magenta",
          title: `${maybeTruckRows} Maybe Truck row${maybeTruckRows === 1 ? "" : "s"} unresolved`,
          owner: "Brian Kee / Warehouse / PM",
          action: "Decide whether each Maybe Truck is real, then either assign it or remove it from the plan.",
          why: "Maybe Truck rows create uncertainty in fleet capacity and warehouse planning."
        });
      }

      if (infoFalse > 0) {
        actions.push({
          severity: "magenta",
          title: `Info Sent still open on ${infoFalse} run${infoFalse === 1 ? "" : "s"}`,
          owner: "Brian Kee / PM",
          action: "Confirm Info Sent status or mark intentionally pending.",
          why: "The dashboard should know whether trucking details have been communicated."
        });
      }

      if (lpoFalse > 0) {
        actions.push({
          severity: "magenta",
          title: `LPO Sent still open on ${lpoFalse} run${lpoFalse === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Confirm LPO status for open rows.",
          why: "Open LPO status can block clean trucking execution and vendor/payment tracking."
        });
      }

      if (driverGaps > 0 && needDriverRows === 0) {
        actions.push({
          severity: "yellow",
          title: `${driverGaps} driver confirmation gap${driverGaps === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Confirm whether these rows have assigned drivers or are intentionally pending.",
          why: "These are not marked NEED DRIVER, but the confirmation signal is incomplete."
        });
      }

      if (missingQuotes.length > 0) {
        actions.push({
          severity: "magenta",
          title: `${missingQuotes.length} FLEX quote/workstream${missingQuotes.length === 1 ? "" : "s"} missing trucking match`,
          owner: "Brian Kee / PM",
          action: `Review missing trucking matches: ${missingQuotes.join(", ")}.`,
          why: "A pulled FLEX workstream may have transportation scope that is not represented in Weekly Runs."
        });
      }

      if (dateComparison?.isMismatch) {
        actions.push({
          severity: "red",
          title: "Trucking dates do not align with FLEX dates",
          owner: "PM / Brian Kee",
          action: "Confirm whether the trucking rows are attached to the correct show/workstream and resolve the source date conflict.",
          why: "Date mismatch changes urgency and can cause the dashboard to understate risk."
        });
      }

      if (!actions.length && rowsFound > 0) {
        actions.push({
          severity: "green",
          title: "No immediate trucking actions found",
          owner: "Brian Kee / PM",
          action: "Continue normal monitoring.",
          why: "Runs are mapped and no major trucking exceptions were detected from the current data."
        });
      }

      return actions;
    }







    async function queryTruckingForShow(showId) {
      const index = activeShows.findIndex((show) => show.id === showId);
      if (index < 0) return;

      const show = activeShows[index];
      const quoteNumbers = getPulledQuoteNumbers(show);

      activeShows[index] = {
        ...activeShows[index],
        truckingQuerying: true
      };

      statusEl.textContent = `Querying Trucking for ${show.name}...`;
      rerenderAll();

      try {
        const response = await fetch("/api/active-shows/trucking-sync", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            showId: show.id,
            showName: show.name,
            quoteNumbers
          })
        });

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "Trucking sync returned not ok");
        }

        activeShows[index] = {
          ...activeShows[index],
          truckingQuerying: false,
          truckingSync: data,
          trucking: data.comparison?.status || data.summary?.status || activeShows[index].trucking
        };

        statusEl.textContent = `Trucking sync complete for ${show.name}: ${data.summary?.rowsFound || 0} rows found.`;
        rerenderAll();
      } catch (error) {
        activeShows[index] = {
          ...activeShows[index],
          truckingQuerying: false,
          truckingSync: {
            error: error.message
          }
        };

        statusEl.textContent = "Error querying trucking: " + error.message;
        rerenderAll();
      }
    }

        renderShows(activeShows);
      } catch (error) {
        statusEl.textContent = "Error syncing: " + error.message;
        console.error(error);
      }
    }

    async function queryFlexForShow(showId) {
      console.log("[Active Shows] Query FLEX clicked:", showId);
      const show = activeShows.find((item) => item.id === showId);
      if (!show) {
        statusEl.textContent = `Could not find show: ${showId}`;
        return;
      }

      const hints = getFlexHints(show);
      if (!hints.length) {
        if (isEventFolderFlex(show)) {
          statusEl.textContent = `FLEX Event Folder is linked for ${show.name}. Use Pull Child Quote Details or individual child pulls as needed.`;
          return;
        }
        statusEl.textContent = `FLEX source not linked yet for ${show.name}.`;
        return;
      }

      statusEl.textContent = `Querying FLEX for ${show.name}...`;

      const queryIndex = activeShows.findIndex((item) => item.id === showId);
      if (queryIndex >= 0) {
        activeShows[queryIndex] = {
          ...activeShows[queryIndex],
          flexQuerying: true
        };
        rerenderAll();
      }

      for (const documentNumber of hints) {
        const currentShow = activeShows.find((item) => item.id === showId);
        const alreadyPulled = currentShow?.flexPulls?.[documentNumber]?.data;

        if (!alreadyPulled) {
          await pullFlexForShow(showId, documentNumber, { keepStatus: true });
        }
      }

      const finalIndex = activeShows.findIndex((item) => item.id === showId);
      if (finalIndex >= 0) {
        activeShows[finalIndex] = {
          ...activeShows[finalIndex],
          flexQuerying: false
        };
      }

      const finalShow = activeShows.find((item) => item.id === showId);
      const pulled = getPulledFlexData(finalShow).length;

      statusEl.textContent = `FLEX query complete for ${finalShow.name}: ${pulled} of ${hints.length} quote${hints.length === 1 ? "" : "s"} pulled.`;

      rerenderAll();
    }

    async function pullFlexForShow(showId, documentNumber, options = {}) {
      const index = activeShows.findIndex((show) => show.id === showId);
      if (index < 0) return;

      activeShows[index] = {
        ...activeShows[index],
        flexPulls: {
          ...(activeShows[index].flexPulls || {}),
          [documentNumber]: {
            loading: true
          }
        }
      };

      rerenderAll();

      try {
        const response = await fetch(
          `/api/active-shows/test-flex-match?documentNumber=${encodeURIComponent(documentNumber)}`
        );

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "FLEX pull returned not ok");
        }

        const phaseOneRecommendation = buildPhaseOneStatusRecommendation(activeShows[index], data);
        const readinessFinding = buildCueReadinessFinding(activeShows[index], data);

        activeShows[index] = {
          ...activeShows[index],
          flexPulls: {
            ...(activeShows[index].flexPulls || {}),
            [documentNumber]: {
              loading: false,
              data
            }
          },
          readinessScore: phaseOneRecommendation.score,
          flexSignal: `FLEX confirmed ${data.showContext?.documentNumber || documentNumber}: ${data.showContext?.showName || "Matched FLEX record"}`,
          nextAction: readinessFinding.actions[0] || activeShows[index].nextAction
        };

        if (showId === "production-design-associates") {
          activeShows[index].readinessStatus = "RED - FLEX/date conflict confirmed";
          activeShows[index].topIssue = "FLEX confirms planned Jul 2–Jul 8 with load-in Jul 6, while folder/index date suggests 7/26.";
        }

        if (!options.keepStatus) {
          statusEl.textContent = `FLEX pull complete for ${activeShows[index].name} / ${documentNumber}.`;
        }
        rerenderAll();
      } catch (error) {
        activeShows[index] = {
          ...activeShows[index],
          flexPulls: {
            ...(activeShows[index].flexPulls || {}),
            [documentNumber]: {
              loading: false,
              error: error.message
            }
          }
        };

        if (!options.keepStatus) {
          statusEl.textContent = "Error pulling FLEX: " + error.message;
        } else {
          console.error("Error pulling FLEX:", documentNumber, error);
        }
        rerenderAll();
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeShowDetail();
      }
    });

    loadShows();
  </script>
</body>
</html>
