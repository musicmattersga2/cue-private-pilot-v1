    function getPulledQuoteNumbers(show) {
      const pulled = show.flexPulls || {};
      const pulledQuotes = Object.keys(pulled).filter((quote) => pulled[quote]?.data);
      return pulledQuotes.length ? pulledQuotes : getFlexHints(show);
    }

    function isShowAskingTrucking(show) {
      return Boolean(show.truckingQuerying);
    }

    function renderTruckingHomeLine(show) {
      const trucking = show.truckingSync;
      if (!trucking?.summary) return "";

      const summary = trucking.summary;
      const runs = Number(summary.rowsFound || 0);
      const driverGaps = Number(summary.driverConfirmedFalse || 0);
      const infoOpen = Number(summary.infoSentFalse || 0);
      const lpoOpen = Number(summary.lpoSentFalse || 0);
      const maybeTrucks = Number(summary.maybeTruckRows || 0);
      const needDriver = Number(summary.needDriverRows || 0);
      const dateComparison = buildDateComparison(show);

      if (!runs) {
        return "Trucking: no runs found yet";
      }

      const parts = [`${runs} run${runs === 1 ? "" : "s"}`];

      if (needDriver > 0) {
        parts.push(`${needDriver} NEED DRIVER`);
      } else if (driverGaps > 0) {
        parts.push(`${driverGaps} driver gap${driverGaps === 1 ? "" : "s"}`);
      } else {
        parts.push("drivers mapped");
      }

      if (infoOpen > 0 && lpoOpen > 0) {
        parts.push("Info/LPO still open");
      } else if (infoOpen > 0) {
        parts.push("Info still open");
      } else if (lpoOpen > 0) {
        parts.push("LPO still open");
      } else {
        parts.push("Info/LPO sent");
      }

      if (maybeTrucks > 0) {
        parts.push(`${maybeTrucks} maybe truck${maybeTrucks === 1 ? "" : "s"}`);
      }

      if (dateComparison.isMismatch) {
        parts.push("date mismatch");
      }

      const actions = buildTruckingActionQueue(show);
      const urgent = actions.filter((action) => action.severity === "red").length;
      const attention = actions.filter((action) => action.severity === "magenta").length;

      if (urgent > 0) {
        parts.push(`${urgent} urgent action${urgent === 1 ? "" : "s"}`);
      } else if (attention > 0) {
        parts.push(`${attention} action${attention === 1 ? "" : "s"}`);
      }

      return `Trucking: ${parts.join(" · ")}`;
    }

    function parseLooseTruckingDate(value, flexReferenceYear = 2026) {
      if (!value) return null;

      const raw = String(value).trim();

      const mmdd = raw.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
      if (mmdd) {
        const month = Number(mmdd[1]);
        const day = Number(mmdd[2]);
        let year = flexReferenceYear;

        if (mmdd[3]) {
          year = Number(mmdd[3]);
          if (year < 100) year += 2000;
        }

        const date = new Date(year, month - 1, day);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      return parseFlexDate(raw);
    }

    function dayKey(date) {
      if (!date) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getFlexDateWindow(show) {
      const pulls = getPulledFlexData(show);
      const contexts = pulls.map((data) => data.showContext || {});

      const loadIn = getEarliestDate(contexts.map((context) => context.loadInDate));
      const loadOut = getLatestDate(contexts.map((context) => context.loadOutDate));
      const plannedStart = getEarliestDate(contexts.map((context) => context.plannedStartDate));
      const plannedEnd = getLatestDate(contexts.map((context) => context.plannedEndDate));

      return {
        startRaw: loadIn || plannedStart || null,
        endRaw: loadOut || plannedEnd || null,
        start: parseFlexDate(loadIn || plannedStart),
        end: parseFlexDate(loadOut || plannedEnd),
      };
    }

    function buildDateComparison(show) {
      const trucking = show.truckingSync;
      const rows = Array.isArray(trucking?.safeRows) ? trucking.safeRows : [];
      const flexWindow = getFlexDateWindow(show);
      const referenceYear =
        flexWindow.start?.getFullYear() ||
        flexWindow.end?.getFullYear() ||
        2026;

      const truckingDates = rows
        .map((row) => parseLooseTruckingDate(row.date, referenceYear))
        .filter(Boolean);

      const uniqueTruckingDays = [...new Set(truckingDates.map(dayKey))];

      if (!rows.length) {
        return {
          status: "UNKNOWN - No trucking rows",
          isMismatch: false,
          flexWindowLabel: flexWindow.start || flexWindow.end
            ? `${formatFlexDateShort(flexWindow.startRaw)} → ${formatFlexDateShort(flexWindow.endRaw)}`
            : "TBD",
          truckingDatesLabel: "No trucking rows",
          findings: ["No trucking rows are available to compare against FLEX dates."],
          actions: ["Run Query Trucking after FLEX is pulled."],
        };
      }

      if (!flexWindow.start && !flexWindow.end) {
        return {
          status: "YELLOW - FLEX dates unavailable",
          isMismatch: false,
          flexWindowLabel: "TBD",
          truckingDatesLabel: uniqueTruckingDays.join(", "),
          findings: ["Trucking dates exist, but FLEX load-in/load-out dates were not available for comparison."],
          actions: ["Pull or confirm the authoritative FLEX quote dates."],
        };
      }

      const start = flexWindow.start || flexWindow.end;
      const end = flexWindow.end || flexWindow.start;
      const startTime = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
      const endTime = new Date(end.getFullYear(), end.getMonth(), end.getDate()).getTime();

      const outsideDates = truckingDates.filter((date) => {
        const t = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        return t < startTime || t > endTime;
      });

      const flexWindowLabel = `${formatFlexDateShort(flexWindow.startRaw)} → ${formatFlexDateShort(flexWindow.endRaw)}`;
      const truckingDatesLabel = uniqueTruckingDays.length
        ? uniqueTruckingDays.join(", ")
        : "TBD";

      if (outsideDates.length) {
        const outsideLabels = [...new Set(outsideDates.map(dayKey))].join(", ");

        return {
          status: "RED - Date mismatch",
          isMismatch: true,
          flexWindowLabel,
          truckingDatesLabel,
          findings: [
            `FLEX date window is ${flexWindowLabel}.`,
            `Trucking rows include dates outside that FLEX window: ${outsideLabels}.`,
          ],
          actions: [
            "Confirm whether the trucking rows are attached to the correct show/workstream.",
            "Resolve date/source conflict before clearing readiness.",
          ],
        };
      }

      return {
        status: "GREEN - Dates align",
        isMismatch: false,
        flexWindowLabel,
        truckingDatesLabel,
        findings: [
          `FLEX date window is ${flexWindowLabel}.`,
          `Trucking dates fall inside the FLEX date window: ${truckingDatesLabel}.`,
        ],
        actions: ["No date mismatch detected from the current FLEX and trucking data."],
      };
    }

    function renderDateComparison(show) {
      if (!show.truckingSync) return "";

      const comparison = buildDateComparison(show);
      const findingItems = comparison.findings
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      const actionItems = comparison.actions
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      return `
        <div class="date-compare-panel">
          <h3>Schedule Check</h3>
          <div>
            <span class="pill ${statusClass(comparison.status)}">${escapeHtml(comparison.status)}</span>
          </div>

          <div class="comparison-grid">
            <div class="comparison-stat">
              <div class="k">FLEX Window</div>
              <div class="v">${escapeHtml(comparison.flexWindowLabel)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Trucking Dates</div>
              <div class="v">${escapeHtml(comparison.truckingDatesLabel)}</div>
            </div>
          </div>

          <div class="label">Finding</div>
          <ul>${findingItems}</ul>

          <div class="label">Recommended next moves</div>
          <ul>${actionItems}</ul>
        </div>
      `;
    }

    function buildTruckingConfidenceScore(data, show = null) {
      const comparison = data?.comparison || {};
      const summary = data?.summary || {};

      let score = 100;
      const reasons = [];

      if (!summary.rowsFound) {
        score -= 60;
        reasons.push("No Weekly Runs rows found");
      }

      if ((comparison.missingQuotes || []).length > 0) {
        score -= 20;
        reasons.push("Some FLEX quote/workstreams are missing trucking matches");
      }

      if (Number(summary.infoSentFalse || 0) > 0) {
        score -= Math.min(24, Number(summary.infoSentFalse || 0) * 2);
        reasons.push("Info Sent is still false on trucking rows");
      }

      if (Number(summary.lpoSentFalse || 0) > 0) {
        score -= Math.min(24, Number(summary.lpoSentFalse || 0) * 2);
        reasons.push("LPO Sent is still false on trucking rows");
      }

      if (Number(summary.maybeTruckRows || 0) > 0) {
        score -= Math.min(18, Number(summary.maybeTruckRows || 0) * 6);
        reasons.push("Maybe Truck rows are unresolved");
      }

      if (Number(summary.needDriverRows || 0) > 0) {
        score -= 35;
        reasons.push("NEED DRIVER rows are present");
      }

      if (show && data?.safeRows?.length) {
        const dateComparison = buildDateComparison(show);

        if (dateComparison.isMismatch) {
          score -= 25;
          reasons.push("Trucking dates fall outside the FLEX date window");
        }
      }

      const finalScore = clampScore(score);

      return {
        score: finalScore,
        color: scoreColor(finalScore),
        reasons,
      };
    }

    function renderTruckingConfidenceScore(data, show = null) {
      const result = buildTruckingConfidenceScore(data, show);

      const reasons = result.reasons.length
        ? `<div class="score-note">${escapeHtml(result.reasons.slice(0, 3).join(" · "))}</div>`
        : `<div class="score-note">Trucking execution is aligned from the data currently pulled.</div>`;

      return `
        <div class="score-wrap">
          <div class="score-row">
            <span>Phase 2 Trucking Confidence</span>
            <span class="score-number">${escapeHtml(result.score)}/100</span>
          </div>
          <div class="score-track">
            <div class="score-fill ${result.color}" style="width:${escapeHtml(result.score)}%"></div>
          </div>
          ${reasons}
        </div>
      `;
    }

    function renderFlexVsTruckingComparison(show) {
      const data = show.truckingSync;
      const comparison = data?.comparison;

      if (!comparison) return "";

      const findingItems = (comparison.findings || [])
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      const actionItems = (comparison.actions || [])
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      return `
        <div class="comparison-panel">
          <h3>CUE Trucking Readiness</h3>
          <div>
            <span class="pill ${statusClass(comparison.status)}">${escapeHtml(comparison.status || "UNKNOWN")}</span>
          </div>

          ${renderTruckingConfidenceScore(data, show)}
          <div class="comparison-grid">
            <div class="comparison-stat">
              <div class="k">Quotes Checked</div>
              <div class="v">${escapeHtml((comparison.requestedQuotes || []).length)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Trucking Quote Matches</div>
              <div class="v">${escapeHtml((comparison.matchedQuotes || []).length)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Runs Found</div>
              <div class="v">${escapeHtml(comparison.rowsFound || 0)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Missing Quotes</div>
              <div class="v">${escapeHtml((comparison.missingQuotes || []).length)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Info Not Sent</div>
              <div class="v">${escapeHtml(comparison.infoFalse || 0)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">LPO Not Sent</div>
              <div class="v">${escapeHtml(comparison.lpoFalse || 0)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">Maybe Truck</div>
              <div class="v">${escapeHtml(comparison.maybeTruckRows || 0)}</div>
            </div>
            <div class="comparison-stat">
              <div class="k">NEED DRIVER</div>
              <div class="v">${escapeHtml(comparison.needDriverRows || 0)}</div>
            </div>
          </div>

          <div class="label">Finding</div>
          <ul>${findingItems || "<li>No comparison finding yet.</li>"}</ul>

          <div class="label">Recommended next moves</div>
          <ul>${actionItems || "<li>No comparison action needed yet.</li>"}</ul>
        </div>
      `;
    }

    function buildTruckingActionQueue(show) {
      const data = show.truckingSync;
      if (!data?.summary) return [];

      const summary = data.summary;
      const comparison = data.comparison || {};
      const actions = [];

      const rowsFound = Number(summary.rowsFound || 0);
      const infoFalse = Number(summary.infoSentFalse || 0);
      const lpoFalse = Number(summary.lpoSentFalse || 0);
      const maybeTruckRows = Number(summary.maybeTruckRows || 0);
      const needDriverRows = Number(summary.needDriverRows || 0);
      const driverGaps = Number(summary.driverConfirmedFalse || 0);
      const missingQuotes = Array.isArray(comparison.missingQuotes)
        ? comparison.missingQuotes
        : [];

      let dateComparison = null;
      try {
        dateComparison = buildDateComparison(show);
      } catch {
        dateComparison = null;
      }

      if (!rowsFound) {
        actions.push({
          severity: "red",
          title: "No trucking runs found",
          owner: "Brian Kee / PM",
          action: "Confirm whether Weekly Runs needs trucking rows for this show or whether transportation is intentionally not required.",
          why: "FLEX or show planning may indicate movement, but no execution rows are currently mapped."
        });
      }

      if (needDriverRows > 0) {
        actions.push({
          severity: "red",
          title: `${needDriverRows} NEED DRIVER row${needDriverRows === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Assign or confirm driver coverage for the NEED DRIVER rows.",
          why: "Driver coverage is a hard dependency for the trucking plan."
        });
      }

      if (maybeTruckRows > 0) {
        actions.push({
          severity: "magenta",
          title: `${maybeTruckRows} Maybe Truck row${maybeTruckRows === 1 ? "" : "s"} unresolved`,
          owner: "Brian Kee / Warehouse / PM",
          action: "Decide whether each Maybe Truck is real, then either assign it or remove it from the plan.",
          why: "Maybe Truck rows create uncertainty in fleet capacity and warehouse planning."
        });
      }

      if (infoFalse > 0) {
        actions.push({
          severity: "magenta",
          title: `Info Sent still open on ${infoFalse} run${infoFalse === 1 ? "" : "s"}`,
          owner: "Brian Kee / PM",
          action: "Confirm Info Sent status or mark intentionally pending.",
          why: "The dashboard should know whether trucking details have been communicated."
        });
      }

      if (lpoFalse > 0) {
        actions.push({
          severity: "magenta",
          title: `LPO Sent still open on ${lpoFalse} run${lpoFalse === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Confirm LPO status for open rows.",
          why: "Open LPO status can block clean trucking execution and vendor/payment tracking."
        });
      }

      if (driverGaps > 0 && needDriverRows === 0) {
        actions.push({
          severity: "yellow",
          title: `${driverGaps} driver confirmation gap${driverGaps === 1 ? "" : "s"}`,
          owner: "Brian Kee",
          action: "Confirm whether these rows have assigned drivers or are intentionally pending.",
          why: "These are not marked NEED DRIVER, but the confirmation signal is incomplete."
        });
      }

      if (missingQuotes.length > 0) {
        actions.push({
          severity: "magenta",
          title: `${missingQuotes.length} FLEX quote/workstream${missingQuotes.length === 1 ? "" : "s"} missing trucking match`,
          owner: "Brian Kee / PM",
          action: `Review missing trucking matches: ${missingQuotes.join(", ")}.`,
          why: "A pulled FLEX workstream may have transportation scope that is not represented in Weekly Runs."
        });
      }

      if (dateComparison?.isMismatch) {
        actions.push({
          severity: "red",
          title: "Trucking dates do not align with FLEX dates",
          owner: "PM / Brian Kee",
          action: "Confirm whether the trucking rows are attached to the correct show/workstream and resolve the source date conflict.",
          why: "Date mismatch changes urgency and can cause the dashboard to understate risk."
        });
      }

      if (!actions.length && rowsFound > 0) {
        actions.push({
          severity: "green",
          title: "No immediate trucking actions found",
          owner: "Brian Kee / PM",
          action: "Continue normal monitoring.",
          why: "Runs are mapped and no major trucking exceptions were detected from the current data."
        });
      }

      return actions;
    }

    function countUrgentTruckingActions(show) {
      const actions = buildTruckingActionQueue(show);
      return actions.filter((action) => action.severity === "red").length;
    }

    function renderTruckingActionQueue(show) {
      if (!show.truckingSync?.summary) return "";

      const actions = buildTruckingActionQueue(show);
      const urgentCount = actions.filter((action) => action.severity === "red").length;
      const needsAttentionCount = actions.filter((action) => action.severity === "magenta").length;

      const items = actions.map((item) => {
        return `
          <div class="action-item">
            <div class="action-top">
              <div class="action-title">${escapeHtml(item.title)}</div>
              <span class="pill severity-${escapeHtml(item.severity)}">${escapeHtml(item.severity.toUpperCase())}</span>
            </div>
            <div class="action-meta"><strong>Owner:</strong> ${escapeHtml(item.owner)}</div>
            <div class="action-meta"><strong>Action:</strong> ${escapeHtml(item.action)}</div>
            <div class="action-meta"><strong>Why it matters:</strong> ${escapeHtml(item.why)}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="action-queue-panel">
          <h3>Trucking Action Queue</h3>
          <div>
            <span class="pill ${urgentCount ? "red" : needsAttentionCount ? "magenta" : "green"}">
              ${escapeHtml(urgentCount)} urgent · ${escapeHtml(needsAttentionCount)} needs attention
            </span>
          </div>
          <div class="action-list">${items}</div>
        </div>
      `;
    }

    function renderTruckingPanel(show) {
      if (show.truckingQuerying) {
        return `
          <div class="trucking-panel">
            <h3>Trucking Sync</h3>
            <div class="flex-asking">
              <span class="flex-spinner"></span>
              <span>Reading Weekly Runs…</span>
            </div>
          </div>
        `;
      }

      const data = show.truckingSync;
      if (!data) return "";

      if (data.error) {
        return `
          <div class="trucking-panel">
            <h3>Trucking Sync</h3>
            <div class="value error">${escapeHtml(data.error)}</div>
          </div>
        `;
      }

      const summary = data.summary || {};
      const rows = Array.isArray(data.safeRows) ? data.safeRows : [];

      const findingItems = (summary.findings || [])
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      const actionItems = (summary.actions || [])
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");

      const rowHtml = rows.slice(0, 12).map((row) => {
        return `
          <tr>
            <td>${escapeHtml(row.quote)}</td>
            <td>${escapeHtml(row.date)}</td>
            <td>${escapeHtml(row.when)}</td>
            <td>${escapeHtml(row.runName)}</td>
            <td>${escapeHtml(displayDriver(row))}</td>
            <td>${escapeHtml(row.truck || "TBD")}</td>
            <td>${escapeHtml(row.trailer || "TBD")}</td>
            <td>${escapeHtml(yesNo(row.infoSent))}</td>
            <td>${escapeHtml(yesNo(row.lpoSent))}</td>
            <td>${escapeHtml(row.notes || "")}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="trucking-panel">
          <h3>Phase 2 Trucking Summary</h3>
          <div>
            <span class="pill ${statusClass(summary.status)}">${escapeHtml(summary.status || "UNKNOWN")}</span>
            <span class="pill cyan">${escapeHtml(data.source || "trucking")}</span>
            ${data.usedFallback ? '<span class="pill yellow">Fallback data</span>' : ''}
          </div>
          ${data.usedFallback ? `<div class="value muted">Live sheet read failed locally: ${escapeHtml(data.fallbackReason || "unknown reason")}</div>` : ''}
          ${renderTruckingConfidenceScore(data, show)}

          <div class="value muted">Plain-English signal: do we have runs, drivers/trucks, paperwork, and unresolved maybe-truck items?</div>

          <div class="trucking-grid">
            <div class="trucking-stat">
              <div class="k">Runs Found</div>
              <div class="v">${escapeHtml(summary.rowsFound || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">Quotes Matched</div>
              <div class="v">${escapeHtml((summary.quoteNumbersMatched || []).length)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">Info Not Sent</div>
              <div class="v">${escapeHtml(summary.infoSentFalse || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">LPO Not Sent</div>
              <div class="v">${escapeHtml(summary.lpoSentFalse || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">Driver Confirmed</div>
              <div class="v">${escapeHtml(summary.driverConfirmedTrue || 0)} / ${escapeHtml(summary.driverConfirmedFalse || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">Maybe Truck</div>
              <div class="v">${escapeHtml(summary.maybeTruckRows || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">NEED DRIVER</div>
              <div class="v">${escapeHtml(summary.needDriverRows || 0)}</div>
            </div>
            <div class="trucking-stat">
              <div class="k">Dates</div>
              <div class="v">${escapeHtml((summary.dates || []).join(", ") || "TBD")}</div>
            </div>
          </div>

          <div class="label">CUE Trucking Finding</div>
          <ul>${findingItems || "<li>No trucking findings yet.</li>"}</ul>

          <div class="label">Recommended next moves</div>
          <ul>${actionItems || "<li>No trucking action needed yet.</li>"}</ul>

          <details class="raw-flex-details">
            <summary>Show trucking rows</summary>
            <div class="raw-flex-inner">
              <table class="trucking-row-table">
                <thead>
                  <tr>
                    <th>Quote</th>
                    <th>Date</th>
                    <th>When</th>
                    <th>Run</th>
                    <th>Driver</th>
                    <th>Truck</th>
                    <th>Trailer</th>
                    <th>Info</th>
                    <th>LPO</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody>${rowHtml}</tbody>
              </table>
            </div>
          </details>
        </div>
      `;
    }

    async function queryTruckingForShow(showId) {
      const index = activeShows.findIndex((show) => show.id === showId);
      if (index < 0) return;

      const show = activeShows[index];
      const quoteNumbers = getPulledQuoteNumbers(show);

      activeShows[index] = {
        ...activeShows[index],
        truckingQuerying: true
      };

      statusEl.textContent = `Querying Trucking for ${show.name}...`;
      rerenderAll();

      try {
        const response = await fetch("/api/active-shows/trucking-sync", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            showId: show.id,
            showName: show.name,
            quoteNumbers
          })
        });

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "Trucking sync returned not ok");
        }

        activeShows[index] = {
          ...activeShows[index],
          truckingQuerying: false,
          truckingSync: data,
          trucking: data.comparison?.status || data.summary?.status || activeShows[index].trucking
        };

        statusEl.textContent = `Trucking sync complete for ${show.name}: ${data.summary?.rowsFound || 0} rows found.`;
        rerenderAll();
      } catch (error) {
        activeShows[index] = {
          ...activeShows[index],
          truckingQuerying: false,
          truckingSync: {
            error: error.message
          }
        };

        statusEl.textContent = "Error querying trucking: " + error.message;
        rerenderAll();
      }
    }

    function renderShowDetail(show) {
      const hints = getFlexHints(show);
      const hintText = hints.length ? hints.join("; ") : "No FLEX hint yet";
      const score = getShowScore(show);
      const scoreHtml = score != null ? renderReadinessScore({ score }) : "";
      const firstPulled = getFirstPulledFindingData(show);

      modalHeaderEl.innerHTML = `
        <div class="modal-title">
          <h2>${escapeHtml(show.name || "Unnamed Show")}</h2>
          <div>${escapeHtml(show.timing || "Timing TBD")} · ${escapeHtml(show.priority || "Priority TBD")}</div>
          <div>
            <span class="pill ${statusClass(show.readinessStatus)}">${escapeHtml(show.readinessStatus || "UNKNOWN")}</span>
            <span class="pill cyan">${escapeHtml(show.changeSignal || "No recent change")}</span>
            ${isShowAskingFlex(show) ? '<span class="pill cyan">Asking FLEX…</span>' : ''}
          </div>
          ${renderKeyInfoRows(show, "modal")}
        </div>
        <div class="modal-actions">
          <button class="secondary" onclick="closeShowDetail()">Close</button>
        </div>
      `;

      modalBodyEl.innerHTML = `
        <div class="detail-panel">
          <h3>Show Snapshot</h3>

          ${scoreHtml}
          ${renderKeyInfoRows(show, "card")}
          ${renderFlexAskingIndicator(show)}

          <div class="label">Top Issue</div>
          <div class="value">${escapeHtml(show.topIssue || "")}</div>

          <div class="label">Next Action</div>
          <div class="value">${escapeHtml(show.nextAction || "")}</div>

          <div class="label">FLEX Signal</div>
          <div class="value">${escapeHtml(show.flexSignal || "")}</div>

          <div class="label">Trucking Signal</div>
          <div class="value">${escapeHtml(show.trucking || "")}</div>

          ${renderSlackDetailSection(show)}

          <div class="label">FLEX Hints / Workstreams</div>
          <div class="value muted">${escapeHtml(hintText)}</div>
          ${renderWorkstreamChips(show)}

          <div class="label">Actions</div>
          <div>
            ${flexButtonsForShow(show)}
            <button class="small trucking-action" onclick="event.stopPropagation(); queryTruckingForShow('${show.id}')">Query Trucking</button>
          </div>
        </div>

        <div>
          ${renderShowRollup(show)}
          ${renderShowLevelFinding(show)}
          ${renderTruckingPanel(show)}
          ${renderTruckingActionQueue(show)}
          ${renderFlexVsTruckingComparison(show)}
          ${renderDateComparison(show)}
          ${firstPulled ? renderCueReadinessFinding(show, firstPulled) : ""}
          ${renderRawFlexDetails(show)}
        </div>
      `;
    }

    function openShowDetail(showId) {
      selectedShowId = showId;
      const show = activeShows.find((item) => item.id === showId);
      if (!show) return;

      renderShowDetail(show);
      modalBackdropEl.classList.add("open");
      showModalEl.classList.add("open");
    }

    function closeShowDetail() {
      selectedShowId = null;
      modalBackdropEl.classList.remove("open");
      showModalEl.classList.remove("open");
    }

    function rerenderAll() {
      renderShows(activeShows);

      if (selectedShowId) {
        const show = activeShows.find((item) => item.id === selectedShowId);
        if (show) renderShowDetail(show);
      }
    }

    showsEl.addEventListener("click", (event) => {
      const queryButton = event.target.closest("[data-query-flex]");
      if (queryButton) {
        event.preventDefault();
        event.stopPropagation();

        const showId = queryButton.getAttribute("data-query-flex");
        queryFlexForShow(showId);
        return;
      }

      const card = event.target.closest("[data-open-show]");
      if (card) {
        const showId = card.getAttribute("data-open-show");
        openShowDetail(showId);
      }
    });

    async function loadShows() {
      statusEl.textContent = "Loading active shows...";

      try {
        const response = await fetch("/api/active-shows");
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "API returned not ok");
        }

        activeShows = enrichShowsWithFlexHints(data.shows || []);
        renderShows(activeShows);
      } catch (error) {
        statusEl.textContent = "Error loading active shows: " + error.message;
        console.error(error);
      }
    }

    async function syncShows() {
      statusEl.textContent = "Syncing...";

      try {
        const response = await fetch("/api/active-shows/sync", {
          method: "POST"
        });

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "API returned not ok");
        }

        activeShows = enrichShowsWithFlexHints(data.shows || []);
        renderShows(activeShows);
      } catch (error) {
        statusEl.textContent = "Error syncing: " + error.message;
        console.error(error);
      }
    }

    async function queryFlexForShow(showId) {
      console.log("[Active Shows] Query FLEX clicked:", showId);
      const show = activeShows.find((item) => item.id === showId);
      if (!show) {
        statusEl.textContent = `Could not find show: ${showId}`;
        return;
      }

      const hints = getFlexHints(show);
      if (!hints.length) {
        statusEl.textContent = `No FLEX hints available for ${show.name}.`;
        return;
      }

      statusEl.textContent = `Querying FLEX for ${show.name}...`;

      const queryIndex = activeShows.findIndex((item) => item.id === showId);
      if (queryIndex >= 0) {
        activeShows[queryIndex] = {
          ...activeShows[queryIndex],
          flexQuerying: true
        };
        rerenderAll();
      }

      for (const documentNumber of hints) {
        const currentShow = activeShows.find((item) => item.id === showId);
        const alreadyPulled = currentShow?.flexPulls?.[documentNumber]?.data;

        if (!alreadyPulled) {
          await pullFlexForShow(showId, documentNumber, { keepStatus: true });
        }
      }

      const finalIndex = activeShows.findIndex((item) => item.id === showId);
      if (finalIndex >= 0) {
        activeShows[finalIndex] = {
          ...activeShows[finalIndex],
          flexQuerying: false
        };
      }

      const finalShow = activeShows.find((item) => item.id === showId);
      const pulled = getPulledFlexData(finalShow).length;

      statusEl.textContent = `FLEX query complete for ${finalShow.name}: ${pulled} of ${hints.length} quote${hints.length === 1 ? "" : "s"} pulled.`;

      rerenderAll();
    }

    async function pullFlexForShow(showId, documentNumber, options = {}) {
      const index = activeShows.findIndex((show) => show.id === showId);
      if (index < 0) return;

      activeShows[index] = {
        ...activeShows[index],
        flexPulls: {
          ...(activeShows[index].flexPulls || {}),
          [documentNumber]: {
            loading: true
          }
        }
      };

      rerenderAll();

      try {
        const response = await fetch(
          `/api/active-shows/test-flex-match?documentNumber=${encodeURIComponent(documentNumber)}`
        );

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "FLEX pull returned not ok");
        }

        const phaseOneRecommendation = buildPhaseOneStatusRecommendation(activeShows[index], data);
        const readinessFinding = buildCueReadinessFinding(activeShows[index], data);

        activeShows[index] = {
          ...activeShows[index],
          flexPulls: {
            ...(activeShows[index].flexPulls || {}),
            [documentNumber]: {
              loading: false,
              data
            }
          },
          readinessScore: phaseOneRecommendation.score,
          flexSignal: `FLEX confirmed ${data.showContext?.documentNumber || documentNumber}: ${data.showContext?.showName || "Matched FLEX record"}`,
          nextAction: readinessFinding.actions[0] || activeShows[index].nextAction
        };

        if (showId === "production-design-associates") {
          activeShows[index].readinessStatus = "RED - FLEX/date conflict confirmed";
          activeShows[index].topIssue = "FLEX confirms planned Jul 2–Jul 8 with load-in Jul 6, while folder/index date suggests 7/26.";
        }

        if (!options.keepStatus) {
          statusEl.textContent = `FLEX pull complete for ${activeShows[index].name} / ${documentNumber}.`;
        }
        rerenderAll();
      } catch (error) {
        activeShows[index] = {
          ...activeShows[index],
          flexPulls: {
            ...(activeShows[index].flexPulls || {}),
            [documentNumber]: {
              loading: false,
              error: error.message
            }
          }
        };

        if (!options.keepStatus) {
          statusEl.textContent = "Error pulling FLEX: " + error.message;
        } else {
          console.error("Error pulling FLEX:", documentNumber, error);
        }
        rerenderAll();
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeShowDetail();
      }
    });

    loadShows();
  </script>
</body>
</html>
