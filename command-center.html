<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CUE Operations Command Center</title>
  <style>
    :root{--bg:#081016;--panel:#101b23;--panel2:#14232d;--line:#243844;--ink:#edf5f7;--muted:#91a6af;--cyan:#49d7ea;--magenta:#e44c9c;--green:#51d29a;--red:#ff6b72;--gold:#efc56a;--shadow:0 18px 50px rgba(0,0,0,.28)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 12% 0,#152533 0,transparent 35%),var(--bg);color:var(--ink);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
    button,input,select,textarea{font:inherit} button{cursor:pointer}.shell{max-width:1500px;margin:auto;padding:26px 30px 56px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:24px}.brand{display:flex;gap:14px;align-items:flex-start}.cue-logo{width:82px;height:40px;object-fit:contain;filter:drop-shadow(0 0 15px rgba(73,215,234,.18))}h1{font-size:25px;margin:0 0 2px;letter-spacing:-.02em}.sub{color:var(--muted)}.build{font-size:12px;color:#66808c;margin-top:4px}.top-actions{display:flex;gap:10px}.btn{border:1px solid var(--line);border-radius:10px;background:#13232c;color:var(--ink);padding:9px 13px}.btn:hover{border-color:#3b5d6b}.btn.primary{background:linear-gradient(120deg,#176b79,#244d63);border-color:#398597}.btn.danger{color:#ffc1c4}.stats{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:12px;margin-bottom:18px}.stat{background:rgba(16,27,35,.92);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}.stat b{display:block;font-size:23px;letter-spacing:-.03em}.stat span{color:var(--muted);font-size:12px}.tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:18px}.tab{border:0;background:transparent;color:var(--muted);padding:12px 14px;border-bottom:2px solid transparent}.tab.active{color:var(--ink);border-color:var(--cyan)}.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px}.search{flex:1;background:#0d1820;border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px 12px}.filter{background:#0d1820;border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px}.card{background:linear-gradient(180deg,rgba(20,35,45,.97),rgba(13,24,32,.98));border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:var(--shadow);position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan)}.card.risk_review:before{background:var(--magenta)}.card.show_match_review:before{background:var(--gold)}.meta{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:10px}.pill{font-size:11px;padding:4px 8px;border-radius:999px;background:#1c303b;color:#d5e3e8;border:1px solid #2a4654}.pill-label{color:#7899a5;text-transform:uppercase;letter-spacing:.05em;font-size:9px;margin-right:4px}.pill.material{color:#ffd7eb;border-color:#6a3153;background:#301a2a}.pill.candidate{color:#ffe4a5;border-color:#66532d;background:#2c2618}.pill.quote{color:#87e9ff;border-color:#286b7d;background:#102c36;text-decoration:none}.pill.quote:hover{border-color:#6de9ff;background:#143a46}.pill.missing{color:#e9c97a;border-color:#66532d;background:#2c2618}.headline{font-size:16px;font-weight:650;line-height:1.35;margin-bottom:12px}.explain{color:var(--muted);font-size:13px;margin-bottom:12px}.evidence{background:#0a141b;border:1px solid #1f333e;border-radius:10px;padding:10px 11px;color:#bdd0d6;font-size:12px;white-space:pre-wrap}.reasons,.alternatives,.readiness{margin:10px 0;color:#8fb0bb;font-size:12px}.readiness{color:#bde5d1}.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.actions .btn{font-size:12px;padding:7px 9px}.empty{border:1px dashed #2c4653;border-radius:16px;padding:50px;text-align:center;color:var(--muted)}.list{display:flex;flex-direction:column;gap:9px}.row{display:grid;grid-template-columns:130px 120px 1fr 160px;gap:12px;align-items:center;background:#101b23;border:1px solid var(--line);border-radius:12px;padding:12px}.row .summary{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status{color:var(--cyan)}.needs_match{color:var(--gold)}.matched{color:var(--green)}.modal{position:fixed;inset:0;background:rgba(2,7,10,.78);display:none;align-items:center;justify-content:center;padding:24px;z-index:20}.modal.open{display:flex}.dialog{width:min(680px,100%);max-height:90vh;overflow:auto;background:#111e27;border:1px solid #31505e;border-radius:18px;padding:22px;box-shadow:0 30px 100px #000}.dialog h2{margin:0 0 6px}.field{margin:14px 0}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.field input,.field textarea{width:100%;background:#0b151c;border:1px solid var(--line);color:var(--ink);padding:10px;border-radius:9px}.field textarea{min-height:80px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}.toast{position:fixed;right:24px;bottom:24px;background:#153126;border:1px solid #2c7354;color:#d7ffeb;padding:12px 16px;border-radius:11px;display:none;z-index:30}.toast.show{display:block}@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.top{flex-direction:column}}
  </style>
</head>
<body>
<main class="shell">
  <header class="top"><div class="brand"><img class="cue-logo" src="/cue-logo.svg" alt="CUE"><div><h1>CUE Operations Command Center</h1><div class="sub">Human control plane for operational evidence, matching, decisions and readiness.</div><div class="build">__CUE_BUILD_LABEL__</div></div></div><div class="top-actions"><a class="btn" href="/active-shows">Active Shows</a><button class="btn primary" id="syncBtn">Sync foundation</button></div></header>
  <section class="stats" id="stats"></section>
  <nav class="tabs"><button class="tab active" data-tab="decisions">My Decisions</button><button class="tab" data-tab="match">Match Review</button><button class="tab" data-tab="evidence">Evidence Only</button></nav>
  <div class="toolbar"><input class="search" id="search" placeholder="Search shows, domains or evidence…"><select class="filter" id="domain"><option value="">All domains</option><option>operations</option><option>equipment</option><option>warehouse</option><option>trucking</option><option>staffing</option><option>schedule</option></select></div>
  <section id="content"></section>
</main>
<div class="modal" id="modal"><div class="dialog"><h2 id="modalTitle">Record decision</h2><div class="sub" id="modalSubtitle"></div><div class="field" id="showField"><label>Show ID</label><input id="showIdInput"></div><div class="field" id="aliasField"><label>Alias to learn (optional)</label><input id="aliasInput" placeholder="How people refer to this show"></div><div class="field"><label>Decision note</label><textarea id="rationale" placeholder="Why this is the correct treatment"></textarea></div><div class="modal-actions"><button class="btn" id="cancel">Cancel</button><button class="btn primary" id="confirm">Confirm decision</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const state={tab:'decisions',summary:{},cards:[],intake:[],query:'',domain:'',pending:null};
const $=s=>document.querySelector(s); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(url,opts={}){const r=await fetch(url,{headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts});if(r.status===401){location.href='/login';throw Error('Login required')}const data=await r.json();if(!r.ok)throw Error(data.error||`HTTP ${r.status}`);return data}
function toast(msg,bad=false){const x=$('#toast');x.textContent=msg;x.style.background=bad?'#3a1b20':'#153126';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),2600)}
async function load(){const [summary,cards,intake]=await Promise.all([api('/api/foundation/summary'),api('/api/foundation/decision-cards?status=open'),api('/api/foundation/intake?limit=500')]);state.summary=summary;state.cards=cards.items||[];state.intake=intake.items||[];render()}
function renderStats(){const s=state.summary;const cells=[['Operational decisions',s.openDecisions],['Match decisions',s.matchDecisions],['Confirmed signals',s.matched],['Candidate signals',s.candidateSignals],['Routed operations',s.routedEvidence],['Needs show match',s.needsMatch]];$('#stats').innerHTML=cells.map(([l,v])=>`<div class="stat"><b>${v??0}</b><span>${l}</span></div>`).join('')}
function matchesFilter(x){const blob=`${x.showId||''} ${x.candidateShowId||''} ${x.domain||x.category||''} ${x.headline||x.summary||''}`.toLowerCase();return (!state.query||blob.includes(state.query))&&(!state.domain||(x.domain||x.category)===state.domain)}
function friendlyShow(id){return String(id||'Unassigned').split('-').map(w=>w?`${w[0].toUpperCase()}${w.slice(1)}`:'').join(' ')}
function flexQuoteHref(documentNumber,elementId){const template=state.summary.flexQuoteUrlTemplate;if(!template)return null;return template.replaceAll('{documentNumber}',encodeURIComponent(documentNumber||'')).replaceAll('{elementId}',encodeURIComponent(elementId||''))}
function labeledPill(label,value,classes=''){return `<span class="pill ${classes}"><span class="pill-label">${esc(label)}</span>${esc(value)}</span>`}
function quotePills(intake){const docs=[...new Set(intake?.flexDocumentNumbers||[])];const elements=intake?.flexQuoteElements||[];if(!docs.length)return labeledPill('FLEX Quote','Not linked','missing');const visible=docs.slice(0,3).map(doc=>{const element=elements.find(x=>String(x.documentNumber)===String(doc));const href=flexQuoteHref(doc,element?.elementId||intake?.flexElementId);const body=`<span class="pill-label">FLEX Quote</span>${esc(doc)}`;return href?`<a class="pill quote" href="${esc(href)}" target="_blank" rel="noopener">${body}</a>`:`<span class="pill quote" title="Set FLEX_QUOTE_URL_TEMPLATE to enable direct opening">${body}</span>`}).join('');return `${visible}${docs.length>3?labeledPill('FLEX Quotes',`+${docs.length-3} more`):''}`}
function cardHtml(c){const source=c.sourceRecord||{};const candidate=c.candidateShowId&&!c.showId;const show=c.intake?.matchedShowName||c.showId||c.candidateShowId||'Unassigned';const showDisplay=c.intake?.matchedShowName||friendlyShow(show);const reasons=c.intake?.matchReasons||[];const primaryScore=Number(c.intake?.matchConfidence||0);const alternatives=(c.matchCandidates||[]).filter(x=>x.candidateEntityId!==(c.showId||c.candidateShowId)&&Number(x.score)>=50&&Number(x.score)>=primaryScore-25).slice(0,3);const readiness=c.cardType==='risk_review'?'Readiness effect: At Risk until resolved':c.cardType==='task_request'?'Readiness effect: Follow-up required':'Readiness effect: No change until the show match is confirmed';const primary=c.cardType==='risk_review'?'Record risk':c.cardType==='task_request'?'Create task':'Accept update';return `<article class="card ${esc(c.cardType)}"><div class="meta">${labeledPill(candidate?'Proposed show':'Show',showDisplay)}${quotePills(c.intake)}${labeledPill('Domain',c.domain)}${labeledPill('Impact',c.impact,esc(c.impact))}${candidate?labeledPill('Match status','Needs confirmation','candidate'):labeledPill('Match status','Confirmed')}</div><div class="headline">${esc(c.headline)}</div><div class="explain">${esc(c.explanation)}</div><div class="evidence">${esc(source.normalizedText||c.headline)}</div>${reasons.length?`<div class="reasons">Why CUE matched it: ${esc(reasons.join(' · '))}</div>`:''}${alternatives.length?`<div class="alternatives">Other credible shows: ${alternatives.map(x=>`${esc(x.candidateEntityName||friendlyShow(x.candidateEntityId))} (${esc(x.score)})`).join(' · ')}</div>`:''}<div class="readiness">${readiness}</div><div class="actions">${candidate?`<button class="btn primary" onclick="openDecision('${c.id}','link_show')">Confirm show</button><button class="btn" onclick="openDecision('${c.id}','choose_another_show')">Choose another</button>`:`<button class="btn primary" onclick="openDecision('${c.id}','${c.cardType==='risk_review'?'create_risk':c.cardType==='task_request'?'create_task':'accept_update'}')">${primary}</button>`}${c.cardType!=='task_request'?`<button class="btn" onclick="openDecision('${c.id}','create_task')">Create task</button>`:''}${c.cardType!=='risk_review'?`<button class="btn" onclick="openDecision('${c.id}','create_risk')">Create risk</button>`:''}<button class="btn" onclick="openDecision('${c.id}','supporting_evidence')">Evidence only</button><button class="btn" onclick="openDecision('${c.id}','snooze')">Snooze</button><button class="btn danger" onclick="openDecision('${c.id}','reject_incorrect')">Reject</button></div></article>`}
function render(){renderStats();document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===state.tab));let html='';if(state.tab==='decisions'){const list=state.cards.filter(c=>c.cardType!=='show_match_review'&&matchesFilter(c));html=list.length?`<div class="grid">${list.map(cardHtml).join('')}</div>`:'<div class="empty">No operational decisions need attention.</div>'}else if(state.tab==='match'){const list=state.cards.filter(c=>c.cardType==='show_match_review'&&matchesFilter(c));html=list.length?`<div class="grid">${list.map(cardHtml).join('')}</div>`:'<div class="empty">No show matches need review.</div>'}else{const activeIds=new Set(state.cards.map(c=>c.intakeItemId));const list=state.intake.filter(x=>!activeIds.has(x.id)&&matchesFilter(x));html=list.length?`<div class="list">${list.map(x=>`<div class="row"><span class="status ${esc(x.status)}">${esc(x.status).replaceAll('_',' ')}</span><span>${esc(x.category)}</span><span class="summary">${esc(x.summary)}</span><span>${esc(x.matchedShowId?friendlyShow(x.matchedShowId):x.candidateShowId?friendlyShow(x.candidateShowId):friendlyShow(x.scope||'company_operations'))}</span></div>`).join('')}</div>`:'<div class="empty">No evidence items match the current filters.</div>'}$('#content').innerHTML=html}
window.openDecision=(id,action)=>{const card=state.cards.find(x=>x.id===id);state.pending={id,action,card};$('#modalTitle').textContent=action.replaceAll('_',' ');$('#modalSubtitle').textContent=card.headline;const showNeeded=['link_show','choose_another_show'].includes(action);$('#showField').style.display=showNeeded?'block':'none';$('#aliasField').style.display=showNeeded?'block':'none';$('#showIdInput').value=card.candidateShowId||card.showId||'';$('#aliasInput').value='';$('#rationale').value='';$('#modal').classList.add('open')};
$('#cancel').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('open')};
$('#confirm').onclick=async()=>{const p=state.pending;if(!p)return;const parameters={};if(['link_show','choose_another_show'].includes(p.action)){parameters.showId=$('#showIdInput').value.trim();parameters.alias=$('#aliasInput').value.trim()}try{await api(`/api/foundation/decision-cards/${encodeURIComponent(p.id)}/decide`,{method:'POST',body:JSON.stringify({action:p.action,actorId:'command-center-user',rationale:$('#rationale').value.trim(),parameters,idempotencyKey:`ui:${p.id}:${p.action}:${Date.now()}`})});$('#modal').classList.remove('open');toast('Decision recorded');await load()}catch(e){toast(e.message,true)}};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;render()});$('#search').oninput=e=>{state.query=e.target.value.toLowerCase();render()};$('#domain').onchange=e=>{state.domain=e.target.value;render()};$('#syncBtn').onclick=async()=>{try{const b=$('#syncBtn');b.disabled=true;b.textContent='Syncing…';await api('/api/foundation/slack/sync',{method:'POST'});toast('Foundation synced');await load();b.textContent='Sync foundation';b.disabled=false}catch(e){toast(e.message,true)}};load().catch(e=>toast(e.message,true));
</script>
</body>
</html>
